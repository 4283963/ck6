<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机房服务器管理控制台</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-left">
        <h1>机房服务器管理控制台</h1>
        <span class="subtitle">刀片服务器 BMC 监控系统</span>
      </div>
      <div class="header-right">
        <div class="selection-info" id="selectionInfo" style="display: none;">
          <span class="selected-count">已选择 <strong id="selectedCount">0</strong> 台</span>
          <button class="btn btn-clear" onclick="clearSelection()">取消选择</button>
        </div>
        <div class="status-badge">
          <span class="status-dot" id="connStatus"></span>
          <span id="connText">连接中...</span>
        </div>
        <div class="stats">
          <div class="stat-item">
            <span class="stat-label">服务器总数</span>
            <span class="stat-value" id="totalCount">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">温度告警</span>
            <span class="stat-value warning" id="alertCount">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">总功耗</span>
            <span class="stat-value" id="totalPower">0 W</span>
          </div>
        </div>
      </div>
    </header>

    <div class="main-content">
      <aside class="sidebar">
        <h3>图例</h3>
        <div class="legend">
          <div class="legend-item">
            <span class="legend-color normal"></span>
            <span>正常 (≤65°C)</span>
          </div>
          <div class="legend-item">
            <span class="legend-color warning"></span>
            <span>温度过高 (>65°C)</span>
          </div>
        </div>

        <h3 style="margin-top: 24px;">机架筛选</h3>
        <div class="rack-filter" id="rackFilter">
        </div>

        <h3 style="margin-top: 24px;">批量操作</h3>
        <div class="global-actions">
          <button class="btn btn-warning" onclick="applyEcoMode()" id="ecoModeBtn" disabled>💡 一键切换到节能模式 (250W)</button>
          <button class="btn btn-secondary" onclick="setSelectedPowerLimit(400)" id="btn400" disabled>选中设为 400W</button>
          <button class="btn btn-secondary" onclick="setSelectedPowerLimit(600)" id="btn600" disabled>选中设为 600W</button>
          <button class="btn btn-secondary" onclick="setSelectedPowerLimit(500)" id="btn500" disabled>选中恢复默认 500W</button>
        </div>

        <h3 style="margin-top: 24px;">全局操作</h3>
        <div class="global-actions">
          <button class="btn btn-secondary" onclick="setAllPowerLimit(600)">全部设为 600W</button>
          <button class="btn btn-secondary" onclick="setAllPowerLimit(400)">全部设为 400W</button>
          <button class="btn btn-secondary" onclick="setAllPowerLimit(500)">恢复默认 500W</button>
        </div>

        <div class="tip-box" style="margin-top: 24px; padding: 12px; background: #2d333b; border-radius: 8px; font-size: 12px; color: #8b949e; line-height: 1.5;">
          <strong>💡 操作提示：</strong><br>
          • 点击格子：查看详情<br>
          • Ctrl+点击：多选/取消<br>
          • Shift+点击：范围选择<br>
          • 双击：快速切换选择
        </div>
      </aside>

      <section class="content">
        <div class="grid-container" id="serverGrid">
        </div>
      </section>
    </div>

    <div class="modal-overlay" id="modalOverlay" style="display: none;">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">服务器详情</h2>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" id="modalBody">
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-left">
        <div class="silent-info">
          <span class="silent-icon">🔇</span>
          <span class="silent-label">智能噪音控制 · 静音模式</span>
          <span class="silent-detail" id="silentDetail">未启用</span>
        </div>
      </div>
      <div class="footer-right">
        <label class="toggle-switch">
          <input type="checkbox" id="silentModeToggle" onchange="toggleSilentMode()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
